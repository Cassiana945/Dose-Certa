# Configura��es do PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/projeto_integrador
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
# Server
server.port=8080

# Logging
logging.level.br.pucgo.ads.projetointegrador=DEBUG
logging.level.org.springframework.web=DEBUG

#JWT
app.jwt-secret=minhaChaveSuperSecreta123456
app.jwt-expiration-milliseconds=86400000

# =========================
# TWILIO CONFIG
# =========================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from=${TWILIO_FROM}




